---
name: Upwind Security Image Scanning
description: Scan against built images
inputs:
  upwind_client_id:
    description: Upwind Client ID
    required: true
  upwind_client_secret:
    description: Upwind Client Secret
    required: true
  docker_image:
    description: Already built docker image residing on same runner
    required: true
  docker_user:
    description: User to authenticate to the Docker registry
    required: false
  docker_password:
    description: Password to authenticate to the Docker registry
    required: false
  pull_image:
    description: Attempt to pull the image. Set to false if image is available locally
    default: true
    type: boolean
  oci_client:
    description: Client with which to pull image. Options are docker (default), podman, and skopeo
    default: docker
    type: string
  additional_registries:
    description: Comma-separated list of additional registries to associate with the scanned image, passed as a string
    required: false
  output_json:
    description: File location to write JSON output to
    default: "output.json"
    type: string
  commit_sha:
    description: SHA to be associated with the build. By default this uses the $GITHUB_SHA environmental variable
    default: ${GITHUB_SHA}
    required: false
  upwind_uri:
    description: Public Upwind URI domain name
    default: upwind.io
    required: false
  use_sudo:
    description: whether to use sudo when invoking the scan to connect to the OCI client
    default: true
    required: false
    type: boolean
  github_token:
    description: GitHub token for authentication
    required: false
  pr_number:
    description: Pull request number
    required: false
  repo_name:
    description: The GitHub repository in owner/repo format
    required: false
  add_comment:
    description: Whether to add a comment to the PR when a scan is completed
    default: false
    required: false
    type: boolean
  perform_multiarchitecture_image_scan:
    description: Whether to perform a multi-arch image scan or not, defaulted to true
    default: true
    required: false
    type: boolean
  debug:
    description: Enable debug logging
    default: false
    type: boolean
  main_branch:
    description: >-
      Base/target branch to diff against (e.g. the PR's base branch, typically
      github.event.pull_request.base.ref). When set, introduced/resolved CVEs
      are computed vs the latest scanned image of this branch instead of the
      previously scanned image. Requires that branch to have been scanned.
    required: false
  pr_id:
    description: Pull request identifier associated with the scan (optional)
    required: false
  pr_link:
    description: Pull request URL associated with the scan (optional)
    required: false
  block_on:
    description: Block workflow based on Upwind Scan Recommendation. Can be either 'do_not_deploy' or 'deploy_with_caution'

runs:
  using: "composite"
  steps:
    - name: Validate required inputs
      shell: bash
      run: |
        if [ "${{ inputs.add_comment }}" = "true" ]; then
          missing=""

          if [ -z "${{ inputs.github_token }}" ]; then
            missing+=" github_token"
          fi

          if [ -z "${{ inputs.pr_number }}" ]; then
            missing+=" pr_number"
          fi

          if [ -z "${{ inputs.repo_name }}" ]; then
            missing+=" repo_name"
          fi

          if [ -n "$missing" ]; then
            echo "Error: Missing required inputs for add_comment=true:$missing"
            exit 1
          fi
        fi
    - name: Download Binary
      id: download_binary

      shell: bash
      run: |
        response=$(curl -sSL -X POST \
        --url "https://oauth.${{ inputs.upwind_uri }}/oauth/token" \
        --data "audience=https://agent.${{ inputs.upwind_uri }}" \
        --data "client_id=${{ inputs.upwind_client_id }}" \
        --data "client_secret=${{ inputs.upwind_client_secret }}" \
        --data "grant_type=client_credentials")

        if ! TOKEN=$(echo "$response" | jq -r '.access_token // empty' 2>/dev/null); then
          echo "Failed to parse JSON response: $response" >&2
          exit 1
        elif [ -z "$TOKEN" ]; then
          echo "No access_token found in response: $response" >&2
          exit 1
        fi

        OS=$(uname | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m | tr '[:upper:]' '[:lower:]')

        case "$ARCH" in
          x86_64)
            ARCH="amd64"
            ;;
          aarch64|arm64)
            ARCH="arm64"
            ;;
          *)
            echo "Unsupported architecture: $ARCH" >&2
            exit 1
            ;;
        esac

        UPWIND_AGENT="shiftleft"
        AGENT_OUTPUT="./$UPWIND_AGENT"
        if [[ "${{ inputs.upwind_uri }}" == "upwind.dev" ]]; then
          RELEASE_BUCKET="releases.upwind.dev"
        else
          RELEASE_BUCKET="releases.upwind.io"
        fi
        UPWIND_AGENT_URL="https://$RELEASE_BUCKET/$UPWIND_AGENT/stable/$OS/$ARCH/$UPWIND_AGENT-$OS-$ARCH"

        echo "Downloading from $UPWIND_AGENT_URL"
        curl -fsS -H "Authorization: Bearer $TOKEN" -L "$UPWIND_AGENT_URL" -o "$AGENT_OUTPUT"
        chmod +x "$AGENT_OUTPUT"
    - name: Execute scan against the docker image
      shell: bash
      env:
        OUTPUT_JSON: ${{ inputs.output_json }}
      run: |
        echo "Running Upwind Scan"
        SCAN_START=$(date +%s)
        COMMIT_SHA=${GITHUB_SHA}
        if [[ -n "${{ inputs.commit_sha }}" ]]; then
          COMMIT_SHA=${{ inputs.commit_sha }}
        fi
        SUDO=""
        if [ "${{ inputs.use_sudo }}" = "true" ]; then
          SUDO=sudo
        fi

        # Optional base-branch diff args. Only added when provided, so the
        # command stays compatible with shiftleft binaries that predate these
        # flags (they are passed only when the user opts in via main_branch).
        EXTRA_ARGS=()
        if [ -n "${{ inputs.main_branch }}" ]; then
          EXTRA_ARGS+=(--main-branch="${{ inputs.main_branch }}")
        fi
        if [ -n "${{ inputs.pr_id }}" ]; then
          EXTRA_ARGS+=(--pr-id="${{ inputs.pr_id }}")
        fi
        if [ -n "${{ inputs.pr_link }}" ]; then
          EXTRA_ARGS+=(--pr-link="${{ inputs.pr_link }}")
        fi

        $SUDO ./shiftleft image \
          --source=GITHUB_ACTIONS \
          --initiator=${GITHUB_TRIGGERING_ACTOR} \
          --upwind-uri=${{ inputs.upwind_uri }} \
          --upwind-client-id=${{ inputs.upwind_client_id }} \
          --upwind-client-secret=${{ inputs.upwind_client_secret }} \
          --docker-image ${{ inputs.docker_image }} \
          --commit-sha ${COMMIT_SHA} \
          --branch ${GITHUB_REF} \
          --repository ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY} \
          --docker-user="${{ inputs.docker_user }}" \
          --docker-password="${{ inputs.docker_password }}" \
          --debug=${{ inputs.debug }}  \
          --additional-registries="${{ inputs.additional_registries}}" \
          --docker-pull=${{ inputs.pull_image }} \
          --output-json=$OUTPUT_JSON \
          --oci-client=${{ inputs.oci_client }} \
          --block-on="${{ inputs.block_on}}" \
          --should-perform-multi-platform-scan=${{ inputs.perform_multiarchitecture_image_scan}} \
          "${EXTRA_ARGS[@]}"
        if [ ! -f "$OUTPUT_JSON" ]; then
          echo "Error: $OUTPUT_JSON not found"
          exit 1
        fi

        echo "Info: Image scan completed"

        # Human-readable scan duration for the PR comment footer.
        SCAN_ELAPSED=$(( $(date +%s) - SCAN_START ))
        if [ "$SCAN_ELAPSED" -ge 60 ]; then
          SCAN_DURATION_HUMAN="$((SCAN_ELAPSED / 60))m $((SCAN_ELAPSED % 60))s"
        else
          SCAN_DURATION_HUMAN="${SCAN_ELAPSED}s"
        fi
        echo "SCAN_DURATION_HUMAN=${SCAN_DURATION_HUMAN}" >> "$GITHUB_ENV"

        # Hand the resolved commit SHA to the comment step. We must export it
        # here (not via the step's env: block) because inputs.commit_sha defaults
        # to the literal "${GITHUB_SHA}", which GitHub Actions does not expand —
        # only this inline shell context expands it to the real SHA.
        echo "RESOLVED_COMMIT_SHA=${COMMIT_SHA}" >> "$GITHUB_ENV"
    - name: Comment on PR (conditional)
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPO: ${{ inputs.repo_name }}
        PR_NUMBER: ${{ inputs.pr_number }}
        ADD_COMMENT: ${{ inputs.add_comment }}
        OUTPUT_JSON: ${{ inputs.output_json }}
        MAIN_BRANCH: ${{ inputs.main_branch }}
        UPWIND_URI: ${{ inputs.upwind_uri }}
      run: |
        if [ "$ADD_COMMENT" != "true" ]; then
          echo "Info: Skipping comment"
          exit 0
        fi

        # Stable marker identifying *our* comment on this PR. We edit the comment
        # carrying this marker in place across commits instead of posting a new
        # one each run (mirrors the SCA/IaC "scan history" behaviour, which the
        # shiftleft-server backend does DB-side; here we have no DB, so the prior
        # history is carried inside the comment as a hidden base64 state blob).
        COMMENT_MARKER="<!-- upwind-image-scan-report -->"
        HISTORY_PREFIX="<!-- upwind-scan-history:"
        HISTORY_MAX_ENTRIES=30

        # RESOLVED_COMMIT_SHA is exported by the scan step (already expanded);
        # fall back to GITHUB_SHA if the scan step was skipped for any reason.
        COMMIT_SHA="${RESOLVED_COMMIT_SHA:-$GITHUB_SHA}"
        COMMIT_URL="${GITHUB_SERVER_URL:-https://github.com}/${REPO}/commit/${COMMIT_SHA}"
        SCANNED_AT="$(date -u '+%Y-%m-%d %H:%M UTC')"

        if [ ! -f "$OUTPUT_JSON" ]; then
          echo "Error: Output file not found: $OUTPUT_JSON"
          exit 1
        fi

        # Normalise the scan output (stream of objects) into a JSON array.
        ARRAY="$(mktemp)"
        jq -cs 'if type=="array" then . else [.] end' "$OUTPUT_JSON" > "$ARRAY"

        # If the backend wasn't ready and returned no usable data, skip the
        # comment rather than posting an "unknown:unknown" placeholder.
        if [ "$(jq '[.[] | select((.imageName // "") != "")] | length' "$ARRAY")" -eq 0 ]; then
          echo "Warning: scan results not ready (empty output); skipping comment"
          exit 0
        fi

        IMAGE_NAME=$(jq -r '.[0].imageName // "unknown"' "$ARRAY")
        IMAGE_VERSION=$(jq -r '.[0].imageVersion // "unknown"' "$ARRAY")
        FINGERPRINT=$(jq -r '.[0].fingerprint // ""' "$ARRAY")
        ARCH_COUNT=$(jq 'length' "$ARRAY")

        # Label for what the diff is computed against.
        if [ -n "$MAIN_BRANCH" ]; then
          BASE_LABEL="\`${MAIN_BRANCH#refs/heads/}\`"
        else
          BASE_LABEL="the previous scan"
        fi

        MAX_ROWS=60

        # Totals across all architectures, recorded as this run's history entry.
        TOTAL_NEW=0
        TOTAL_RESOLVED=0

        COMMENT="${COMMENT_MARKER}"$'\n'
        COMMENT+="# 🏄‍♂️ Upwind Image Scan Report"$'\n'
        COMMENT+="**Image:** \`$IMAGE_NAME:$IMAGE_VERSION\`"$'\n\n'

        # Render a collapsible table of the given CVE JSON array (capped).
        # $1=cves json  $2=summary line  $3=with_fix ("1" to include a Fix column)
        emit_table() {
          local cves_json="$1" summary="$2" with_fix="$3" rows total
          rows=$(echo "$cves_json" | jq -r --argjson max "$MAX_ROWS" '
            [.[]][0:$max][]
            | [ (.cveId // .cveName // "<unknown>"),
                (.packageName // ""),
                (.packageVersion // ""),
                (.fixedInVersion // "") ]
            | @tsv')
          total=$(echo "$cves_json" | jq 'length')
          COMMENT+="<details><summary>${summary}</summary>"$'\n\n'
          if [ "$with_fix" = "1" ]; then
            COMMENT+=$'| CVE | Package | Version | Fix |\n|---|---|---|---|\n'
          else
            COMMENT+=$'| CVE | Package | Version |\n|---|---|---|\n'
          fi
          while IFS=$'\t' read -r CVE PKG VER FIX; do
            [ -z "${CVE}" ] && CVE="<unknown>"
            # Link CVE ids to their NVD detail page.
            case "$CVE" in
              CVE-*) CVE_CELL="[${CVE}](https://nvd.nist.gov/vuln/detail/${CVE})" ;;
              *)     CVE_CELL="${CVE}" ;;
            esac
            local pkg_cell="—" ver_cell="—" fix_cell="—"
            [ -n "$PKG" ] && pkg_cell="\`${PKG}\`"
            [ -n "$VER" ] && ver_cell="\`${VER}\`"
            [ -n "$FIX" ] && fix_cell="\`${FIX}\`"
            if [ "$with_fix" = "1" ]; then
              COMMENT+="| ${CVE_CELL} | ${pkg_cell} | ${ver_cell} | ${fix_cell} |"$'\n'
            else
              COMMENT+="| ${CVE_CELL} | ${pkg_cell} | ${ver_cell} |"$'\n'
            fi
          done <<< "$rows"
          if [ "$total" -gt "$MAX_ROWS" ]; then
            COMMENT+="_…and $((total - MAX_ROWS)) more._"$'\n'
          fi
          COMMENT+=$'</details>\n\n'
        }

        # Introduced findings for one severity, as a collapsible section.
        emit_introduced_sev() {
          local intro_json="$1" sev="$2" emoji="$3" label="$4" n sfx
          n=$(echo "$intro_json" | jq --arg s "$sev" '[.[] | select((.severity // "" | ascii_upcase)==$s)] | length')
          [ "$n" -eq 0 ] && return 0
          sfx="s"; if [ "$n" -eq 1 ]; then sfx=""; fi
          emit_table "$(echo "$intro_json" | jq -c --arg s "$sev" '[.[] | select((.severity // "" | ascii_upcase)==$s)]')" \
                     "${emoji} <strong>${label}</strong> · ${n} finding${sfx}" "1"
        }

        while IFS= read -r scan; do
          ARCH=$(echo "$scan" | jq -r '.arch? // ""')
          STATUS=$(echo "$scan" | jq -r '.scanStatus // ""')
          INTRO=$(echo "$scan" | jq -c '.introducedCves // []')
          RESOLVED=$(echo "$scan" | jq -c '.resolvedCves // []')
          PRESENT=$(echo "$scan" | jq -c '(.introducedCves // []) + (.noChangeCves // [])')

          N=$(echo "$INTRO" | jq 'length')
          R=$(echo "$RESOLVED" | jq 'length')
          T=$(echo "$PRESENT" | jq 'length')
          TOTAL_NEW=$((TOTAL_NEW + N))
          TOTAL_RESOLVED=$((TOTAL_RESOLVED + R))
          cC=$(echo "$PRESENT" | jq '[.[] | select((.severity // "" | ascii_upcase)=="CRITICAL")] | length')
          cH=$(echo "$PRESENT" | jq '[.[] | select((.severity // "" | ascii_upcase)=="HIGH")] | length')
          cM=$(echo "$PRESENT" | jq '[.[] | select((.severity // "" | ascii_upcase)=="MEDIUM")] | length')
          cL=$(echo "$PRESENT" | jq '[.[] | select((.severity // "" | ascii_upcase)=="LOW")] | length')
          cU=$(echo "$PRESENT" | jq '[.[] | select((.severity // "" | ascii_upcase) as $s | ($s!="CRITICAL" and $s!="HIGH" and $s!="MEDIUM" and $s!="LOW"))] | length')

          # Per-arch header + status.
          if [ -n "$ARCH" ]; then
            COMMENT+="## $ARCH"$'\n'
          fi
          if [ -n "$STATUS" ]; then
            COMMENT+="- **Status:** \`$STATUS\`"$'\n'
          fi
          if [ -n "$ARCH" ] || [ -n "$STATUS" ]; then
            COMMENT+=$'\n'
          fi

          # Summary line: counts only (introduced / resolved / total present).
          ivword="vulnerabilities"; if [ "$N" -eq 1 ]; then ivword="vulnerability"; fi
          COMMENT+="**${N}** newly introduced ${ivword} · **${R}** resolved · **${T}** total in this PR vs ${BASE_LABEL}"$'\n'

          # Severity breakdown of the total present (counts only, not listed).
          BREAK=""
          [ "$cC" -gt 0 ] && BREAK+="🔴 ${cC} Critical | "
          [ "$cH" -gt 0 ] && BREAK+="🔶 ${cH} High | "
          [ "$cM" -gt 0 ] && BREAK+="🟡 ${cM} Medium | "
          [ "$cL" -gt 0 ] && BREAK+="🟢 ${cL} Low | "
          [ "$cU" -gt 0 ] && BREAK+="⚪ ${cU} Other | "
          BREAK="${BREAK% | }"
          if [ -n "$BREAK" ]; then COMMENT+="$BREAK"$'\n'; fi
          COMMENT+=$'\n'

          # Detail tables: ONLY introduced (by severity) + resolved.
          # The "total" / already-present CVEs are counted above but not listed.
          emit_introduced_sev "$INTRO" "CRITICAL" "🔴" "Critical"
          emit_introduced_sev "$INTRO" "HIGH"     "🔶" "High"
          emit_introduced_sev "$INTRO" "MEDIUM"   "🟡" "Medium"
          emit_introduced_sev "$INTRO" "LOW"      "🟢" "Low"
          if [ "$R" -gt 0 ]; then
            rsfx="s"; if [ "$R" -eq 1 ]; then rsfx=""; fi
            emit_table "$RESOLVED" "✅ <strong>Resolved</strong> · ${R} finding${rsfx}" "0"
          fi
        done < <(jq -c '.[]' "$ARRAY")

        # Footer: link to the full analysis in the Upwind Console + scan time.
        if [ -n "$FINGERPRINT" ]; then
          COMMENT+="[View full analysis in Upwind Console →](https://console.${UPWIND_URI:-upwind.io}/code?mainPageTab=Reviews&secondaryTab=SCA&sidePanel=scan-at-build&sidePanelItemId=${FINGERPRINT})"$'\n\n'
        fi
        if [ -n "${SCAN_DURATION_HUMAN:-}" ]; then
          COMMENT+="_Scan completed in ${SCAN_DURATION_HUMAN}_"$'\n'
        fi

        # --- Sticky comment + scan history ------------------------------------
        # Locate any prior comment of ours on this PR (by marker) and recover the
        # accumulated scan history it carries, so we edit it in place and append
        # to history instead of posting a fresh comment on every commit.
        AUTH_HDR="Authorization: bearer $GH_TOKEN"
        API="https://api.github.com/repos/$REPO"

        EXISTING_ID=""
        PRIOR_HISTORY="[]"
        page=1
        while [ "$page" -le 10 ]; do
          PAGE_JSON=$(curl -fsSL \
            -H "$AUTH_HDR" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$API/issues/$PR_NUMBER/comments?per_page=100&page=$page" 2>/dev/null || echo "[]")
          [ "$(echo "$PAGE_JSON" | jq 'length')" -eq 0 ] && break

          MATCH=$(echo "$PAGE_JSON" | jq -c --arg m "$COMMENT_MARKER" \
            'map(select(.body | contains($m))) | .[0] // empty')
          if [ -n "$MATCH" ]; then
            EXISTING_ID=$(echo "$MATCH" | jq -r '.id')
            # Recover the hidden base64 history blob from the prior comment body.
            PRIOR_B64=$(echo "$MATCH" | jq -r '.body' \
              | sed -n "s/.*${HISTORY_PREFIX}\([A-Za-z0-9+/=]*\) -->.*/\1/p" | head -n1)
            if [ -n "$PRIOR_B64" ]; then
              DECODED=$(printf '%s' "$PRIOR_B64" | base64 -d 2>/dev/null || echo "")
              if echo "$DECODED" | jq -e 'type=="array"' >/dev/null 2>&1; then
                PRIOR_HISTORY="$DECODED"
              fi
            fi
            break
          fi
          page=$((page + 1))
        done

        # Append this run as the newest history entry (keep only the last N).
        HISTORY_JSON=$(echo "$PRIOR_HISTORY" | jq -c \
          --arg sha "$COMMIT_SHA" \
          --arg url "$COMMIT_URL" \
          --arg ts "$SCANNED_AT" \
          --argjson new "$TOTAL_NEW" \
          --argjson resolved "$TOTAL_RESOLVED" \
          --argjson max "$HISTORY_MAX_ENTRIES" \
          '. + [{sha: $sha, url: $url, ts: $ts, new: $new, resolved: $resolved}] | .[-$max:]')

        # Render the visible "Scan history" section from the accumulated entries.
        HISTORY_MD=$(echo "$HISTORY_JSON" | jq -r '
          (length) as $n |
          (if $n == 1 then "scan" else "scans" end) as $noun |
          "---\n\n<details>\n<summary>Scan history (\($n) \($noun))</summary>\n\n"
          + "| Commit | Scanned at | New | Resolved | Net |\n"
          + "|--------|------------|-----|----------|-----|\n"
          + ([ to_entries[]
               | .key as $i | .value as $e
               | (if $i == ($n - 1) then " <" else "" end) as $latest
               | (if $e.new > 0 then "+\($e.new)" else "0" end) as $newc
               | (if $e.resolved > 0 then "-\($e.resolved)" else "0" end) as $resc
               | ($e.new - $e.resolved) as $net
               | (if $net > 0 then "+\($net)" else "\($net)" end) as $netc
               | "| [`\($e.sha[0:7])`](\($e.url))\($latest) | \($e.ts) | \($newc) | \($resc) | \($netc) |"
             ] | join("\n"))
          + "\n\n</details>\n\n"
          + (.[-1] | "_Last scanned: [`\(.sha[0:7])`](\(.url)) · \(.ts)_\n")
        ')

        COMMENT+="$HISTORY_MD"

        # Hidden state blob: source of truth for the next run's history table.
        HISTORY_B64=$(printf '%s' "$HISTORY_JSON" | base64 | tr -d '\n')
        HIDDEN_STATE=$'\n'"${HISTORY_PREFIX}${HISTORY_B64} -->"$'\n'

        # Hard safety net: never exceed GitHub's 65536-char limit. Truncate the
        # visible body only, reserving room for the hidden state which must stay
        # intact (it is what the next run reads to rebuild the full history).
        CAP=$((65000 - ${#HIDDEN_STATE}))
        if [ "${#COMMENT}" -gt "$CAP" ]; then
          COMMENT="${COMMENT:0:$((CAP - 500))}"
          COMMENT="${COMMENT%$'\n'*}"
          OPEN_TAGS=$(grep -c '<details>' <<< "$COMMENT" || true)
          CLOSE_TAGS=$(grep -c '</details>' <<< "$COMMENT" || true)
          while [ "$OPEN_TAGS" -gt "$CLOSE_TAGS" ]; do
            COMMENT+=$'\n</details>'
            CLOSE_TAGS=$((CLOSE_TAGS + 1))
          done
          COMMENT+=$'\n\n_Comment truncated to fit GitHub\'s size limit — see the Upwind Console._'
        fi
        COMMENT+="$HIDDEN_STATE"

        # Send the body via a file, never as a shell argument.
        PAYLOAD_FILE="$(mktemp)"
        printf '%s' "$COMMENT" | jq -Rs '{ body: . }' > "$PAYLOAD_FILE"
        if [ -n "$EXISTING_ID" ]; then
          echo "Updating existing PR comment ($EXISTING_ID) with new scan + history"
          curl -L \
            -X PATCH \
            -H "$AUTH_HDR" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --data @"$PAYLOAD_FILE" \
            "$API/issues/comments/$EXISTING_ID"
        else
          echo "Posting new summary comment on PR"
          curl -L \
            -X POST \
            -H "$AUTH_HDR" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --data @"$PAYLOAD_FILE" \
            "$API/issues/$PR_NUMBER/comments"
        fi
        rm -f "$PAYLOAD_FILE"
